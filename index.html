<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A-Mundo Realty | Próximamente</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: #f7f9fb;
      color: #545454;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top accent bar */
    .top-bar {
      background-color: #00aeef;
      height: 5px;
      width: 100%;
    }

    /* Header */
    header {
      background-color: #ffffff;
      padding: 28px 40px;
      border-bottom: 1px solid #e8edf2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header img {
      height: 56px;
      width: auto;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 4px;
      border-top: 4px solid #00aeef;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 560px;
      width: 100%;
      padding: 56px 48px;
      text-align: center;
    }

    .icon-house {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      background-color: #e8f7fd;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-house svg {
      width: 32px;
      height: 32px;
      fill: #00aeef;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #545454;
      margin-bottom: 14px;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 15px;
      color: #717D8F;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background-color: #00aeef;
      margin: 0 auto 36px;
      border-radius: 2px;
    }

    .contact-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00aeef;
      margin-bottom: 12px;
    }

    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background-color: #00aeef;
      color: #ffffff;
      text-decoration: none;
      font-size: 20px;
      font-weight: 700;
      padding: 16px 36px;
      border-radius: 3px;
      transition: background-color 0.2s ease;
      letter-spacing: 0.5px;
    }

    .phone-link:hover {
      background-color: #0099d4;
    }

    .phone-link svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
      flex-shrink: 0;
    }

    /* Footer */
    footer {
      background-color: #4b4b4c;
      color: #efefef;
      text-align: center;
      padding: 20px 40px;
      font-size: 13px;
    }

    footer a {
      color: #00aeef;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      header img { height: 44px; }
      .card { padding: 40px 28px; }
      h1 { font-size: 22px; }
      .phone-link { font-size: 18px; padding: 14px 28px; }
    }
  </style>
</head>
